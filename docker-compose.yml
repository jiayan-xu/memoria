# Memoria 本地回环（loopback）部署（P2-6 DX）
# Local loopback deployment: the service is reachable ONLY at 127.0.0.1:9003
# on the host. It is NOT exposed to the LAN or public network by default.
#
# 用法 / Usage:
#   1. cp .env.example .env   &&  编辑 .env 填入 MEMORIA_ADMIN_KEY
#   2. docker compose up -d --build
#   3. 浏览器打开 http://127.0.0.1:9003/app

services:
  memoria:
    build: .
    # 仅绑定本机回环地址，避免意外暴露
    ports:
      - "127.0.0.1:9003:9003"
    environment:
      MEMORIA_HOST: "0.0.0.0"          # 容器内监听所有接口（容器网络隔离）
      MEMORIA_PORT: "9003"
      MEMORIA_DB_PATH: "/app/data/memoria.db"
      MEMORIA_AUTH_DB_PATH: "/app/data/audit.db"
      MEMORIA_BACKUP_DIR: "/app/data/backups"
      MEMORIA_WEB_DIR: "/app/web"
      AGENT_CORE_LOG: "info"
      RUST_LOG: "info"
      # 管理员密钥从宿主环境变量 / .env 注入，绝不硬编码
      MEMORIA_ADMIN_KEY: "${MEMORIA_ADMIN_KEY:-}"
    # .env 已被 .gitignore 忽略，不会进仓库
    env_file:
      - .env
    volumes:
      - memoria-data:/app/data
    restart: unless-stopped

volumes:
  memoria-data:
