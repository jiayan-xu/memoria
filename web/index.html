<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria 记忆中心</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis-network.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis-network.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a23;
  --surface2: #24243a;
  --border: #2a2a3a;
  --text: #e4e4f0;
  --text2: #9898b4;
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --hot: #ff6b6b;
  --warm: #ffd93d;
  --cold: #6c8ebf;
  --danger: #e74c3c;
  --success: #2ecc71;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
.logo span { color: var(--accent2); }
.stats-bar { display: flex; gap: 20px; font-size: 0.82rem; color: var(--text2); }
.stats-bar b { color: var(--text); }
nav { display: flex; gap: 4px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
nav button {
  background: none; border: none; color: var(--text2);
  padding: 8px 18px; border-radius: 8px; cursor: pointer;
  font-size: 0.9rem; font-family: inherit;
  transition: all 0.15s;
}
nav button:hover { background: var(--surface2); color: var(--text); }
nav button.active { background: var(--accent); color: #fff; }
main { max-width: 1100px; margin: 0 auto; padding: 24px; }
.tab { display: none; }
.tab.active { display: block; }

/* Search */
.search-box {
  display: flex; gap: 8px; margin-bottom: 20px;
}
.search-box input {
  flex: 1; padding: 12px 18px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 1rem; font-family: inherit;
  outline: none; transition: border 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box button {
  padding: 12px 24px; border: none; border-radius: var(--radius);
  background: var(--accent); color: #fff; cursor: pointer;
  font-family: inherit; font-size: 0.95rem; font-weight: 600;
  transition: background 0.2s;
}
.search-box button:hover { background: var(--accent2); }

/* Memory cards */
.memory-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.memory-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.memory-card .meta {
  display: flex; gap: 10px; align-items: center; margin-bottom: 6px;
  font-size: 0.75rem; flex-wrap: wrap;
}
.memory-card .content-preview {
  font-size: 0.9rem; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.badge {
  padding: 2px 8px; border-radius: 12px; font-weight: 600; font-size: 0.7rem;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.badge-hot { background: rgba(255,107,107,0.15); color: var(--hot); }
.badge-warm { background: rgba(255,217,61,0.15); color: var(--warm); }
.badge-cold { background: rgba(108,142,191,0.15); color: var(--cold); }
.badge-importance { background: rgba(124,92,252,0.12); color: var(--accent2); }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filters select, .filters input {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: inherit;
  font-size: 0.85rem; outline: none;
}
.filters input { flex: 0 1 200px; }

/* Detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; max-width: 640px; width: 90%;
  max-height: 80vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 12px; color: var(--accent2); }
.modal .field { margin-bottom: 10px; }
.modal .field label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 3px; }
.modal .field input, .modal .field textarea, .modal .field select {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.9rem;
}
.modal .field textarea { min-height: 100px; resize: vertical; }
.modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal .actions button {
  padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer;
  font-family: inherit; font-size: 0.85rem; font-weight: 600;
}
.btn-save { background: var(--accent); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border) !important; }
.close-btn {
  position: absolute; top: 16px; right: 16px; background: none; border: none;
  color: var(--text2); font-size: 1.5rem; cursor: pointer;
}

/* Settings */
.setting-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 12px;
}
.setting-card h3 { font-size: 1rem; margin-bottom: 10px; color: var(--accent2); }
.setting-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.setting-row label { min-width: 160px; font-size: 0.85rem; color: var(--text2); }
.setting-row input, .setting-row select {
  padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: inherit;
  font-size: 0.85rem; flex: 1; max-width: 200px;
}

/* Graph */
#graph-container {
  width: 100%; height: 520px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); overflow: hidden;
}

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  padding: 12px 20px; border-radius: 10px; font-size: 0.85rem;
  font-weight: 600; animation: slideUp 0.3s ease;
}
.toast-success { background: var(--success); color: #fff; }
.toast-error { background: var(--danger); color: #fff; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Pagination */
.pagination { display: flex; gap: 6px; justify-content: center; margin-top: 20px; }
.pagination button {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer;
  font-family: inherit; font-size: 0.85rem;
}
.pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">🧠 Memoria <span>记忆中心</span></div>
  <div style="display:flex;align-items:center;gap:16px;">
    <a href="intro.html" style="color:var(--accent2);text-decoration:none;font-size:0.82rem;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">📋 项目介绍</a>
    <a href="flow.html" style="color:var(--accent2);text-decoration:none;font-size:0.82rem;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">🔀 架构流程</a>
    <div class="stats-bar" id="statBar">
      <span>🔥 <b id="statHot">-</b></span>
      <span>🌡️ <b id="statWarm">-</b></span>
      <span>❄️ <b id="statCold">-</b></span>
      <span>📦 <b id="statTotal">-</b></span>
    </div>
  </div>
</header>

<nav>
  <button class="active" data-tab="search">🔍 搜索</button>
  <button data-tab="browse">🗂️ 浏览</button>
  <button data-tab="graph">📊 图谱</button>
  <button data-tab="settings">⚙️ 设置</button>
  <a href="timeline.html" style="background:none;border:none;color:var(--text2);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:inherit;text-decoration:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:4px" onmouseover="this.style.background='var(--surface2)';this.style.color='var(--text)'" onmouseout="this.style.background='none';this.style.color='var(--text2)'">⏱ 时间线</a>
  <a href="readme.html" style="background:none;border:none;color:var(--text2);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:inherit;text-decoration:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:4px" onmouseover="this.style.background='var(--surface2)';this.style.color='var(--text)'" onmouseout="this.style.background='none';this.style.color='var(--text2)'">📖 演进</a>
</nav>

<main>
  <!-- Search Tab -->
  <div class="tab active" id="tab-search">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索记忆... (支持全文 + 语义搜索)" onkeydown="if(event.key==='Enter')search()">
      <button onclick="search()">搜索</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- Browse Tab -->
  <div class="tab" id="tab-browse">
    <div class="filters">
      <select id="filterTier" onchange="loadMemories()">
        <option value="">全部层级</option>
        <option value="hot">🔥 Hot</option>
        <option value="warm">🌡️ Warm</option>
        <option value="cold">❄️ Cold</option>
      </select>
      <select id="filterCategory" onchange="loadMemories()">
        <option value="">全部分类</option>
        <option value="decision">决策</option>
        <option value="preference">偏好</option>
        <option value="constraint">约束</option>
        <option value="lesson">教训</option>
        <option value="fact">事实</option>
        <option value="conversation">对话</option>
      </select>
      <input type="text" id="filterSearch" placeholder="关键词..." onkeydown="if(event.key==='Enter')loadMemories()">
      <button class="btn-ghost" style="border:1px solid var(--border);padding:6px 14px;border-radius:8px;cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit" onclick="loadMemories()">筛选</button>
    </div>
    <div id="browseResults"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- Graph Tab -->
  <div class="tab" id="tab-graph">
    <div id="graph-container"></div>
  </div>

  <!-- Settings Tab -->
  <div class="tab" id="tab-settings">
    <div class="setting-card">
      <h3>💾 数据备份</h3>
      <p style="font-size:0.85rem;color:var(--text2);margin-bottom:12px">导出全部数据为 zip 文件，可拷到其他机器恢复</p>
      <button class="btn-save" onclick="exportData()" style="background:var(--accent);color:#fff;font-family:inherit;padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-weight:600">📥 导出备份 (ZIP)</button>
    </div>
    <div class="setting-card">
      <h3>📥 数据恢复</h3>
      <p style="font-size:0.85rem;color:var(--text2);margin-bottom:12px">从备份 zip 恢复。会先备份当前数据为 .bak</p>
      <input type="file" id="restoreFile" accept=".zip" style="display:block;margin-bottom:10px;color:var(--text)">
      <button class="btn-ghost" onclick="importData()" style="background:var(--surface);color:var(--text);border:1px solid var(--border) !important;font-family:inherit;padding:10px 22px;border-radius:8px;cursor:pointer;font-weight:600">📤 恢复数据</button>
    </div>
    <div class="setting-card">
      <h3>⚙️ 参数配置</h3>
      <div class="setting-row">
        <label>衰减半衰期 (天)</label>
        <input type="number" id="cfgHalfLife" value="14" min="1" max="365">
      </div>
      <div class="setting-row">
        <label>冷记忆阈值</label>
        <input type="number" id="cfgColdThreshold" value="0.1" min="0" max="1" step="0.01">
      </div>
      <div class="setting-row">
        <label>清理阈值</label>
        <input type="number" id="cfgCleanupThreshold" value="0.05" min="0" max="1" step="0.01">
      </div>
      <div class="setting-row">
        <label>梦境间隔 (小时)</label>
        <input type="number" id="cfgDreamInterval" value="6" min="1" max="48">
      </div>
      <button class="btn-save" onclick="saveConfig()" style="background:var(--accent);color:#fff;font-family:inherit;padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin-top:8px">保存配置</button>
    </div>
    <div class="setting-card">
      <h3>🧹 维护操作</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-ghost" onclick="triggerDream()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);font-family:inherit;padding:8px 16px;border-radius:8px;cursor:pointer">触发梦境</button>
        <button class="btn-ghost" onclick="triggerDecay()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);font-family:inherit;padding:8px 16px;border-radius:8px;cursor:pointer">运行衰减</button>
        <button class="btn-ghost" onclick="triggerBridgeSync()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);font-family:inherit;padding:8px 16px;border-radius:8px;cursor:pointer">桥接同步</button>
      </div>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast -->
<div id="toastContainer"></div>

<script>
// ─── API ────────────────────────────────────────
const _rawEndpoints = ['/stats', '/graph', '/decay_timeline', '/bridge/sync', '/bridge/status'];
const API = '';

async function api(path, opts = {}) {
  const prefix = _rawEndpoints.some(p => path.startsWith(p)) ? '' : '/api';
  const res = await fetch(prefix + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('application/zip') || opts.raw) return res;
  return res.json();
}

// ─── Navigation ─────────────────────────────────
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'graph') loadGraph();
    if (btn.dataset.tab === 'settings') loadConfig();
    if (btn.dataset.tab === 'browse') loadMemories();
  });
});

// ─── Stats ──────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('/stats');
    document.getElementById('statHot').textContent = s.memories.hot;
    document.getElementById('statWarm').textContent = s.memories.warm;
    document.getElementById('statCold').textContent = s.memories.cold;
    document.getElementById('statTotal').textContent = s.memories.hot + s.memories.warm + s.memories.cold;
  } catch(e) {}
}

// ─── Search ─────────────────────────────────────
async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const container = document.getElementById('searchResults');
  container.innerHTML = '<div class="empty"><div class="icon">🔎</div>搜索中...</div>';
  try {
    // Try direct FTS+ChromaDB via stats-like approach
    // Use MCP memory_search by posting to /mcp
    const body = {
      jsonrpc: '2.0', id: 1, method: 'tools/call',
      params: { name: 'memory_search', arguments: { query: q, max_results: 10, search_type: 'hybrid' } }
    };
    const res = await fetch('/mcp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    const text = data.result?.content?.[0]?.text;
    if (!text) { container.innerHTML = '<div class="empty"><div class="icon">📭</div>无结果</div>'; return; }
    const parsed = JSON.parse(text);
    if (!parsed.results?.length) {
      container.innerHTML = '<div class="empty"><div class="icon">📭</div>未找到相关记忆</div>';
      return;
    }
    renderMemoryCards(container, parsed.results);
  } catch(e) {
    container.innerHTML = `<div class="empty"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

// ─── Browse ─────────────────────────────────────
let currentPage = 1;
async function loadMemories(page = 1) {
  currentPage = page;
  const tier = document.getElementById('filterTier').value;
  const category = document.getElementById('filterCategory').value;
  const search = document.getElementById('filterSearch').value.trim();
  const params = new URLSearchParams({ page, limit: 30 });
  if (tier) params.set('tier', tier);
  if (category) params.set('category', category);
  if (search) params.set('search', search);

  const container = document.getElementById('browseResults');
  container.innerHTML = '<div class="empty"><div class="icon">📂</div>加载中...</div>';

  try {
    const data = await api(`/memories?${params}`);
    container.innerHTML = '';
    if (!data.memories.length) {
      container.innerHTML = '<div class="empty"><div class="icon">📭</div>暂无记忆</div>';
      return;
    }
    data.memories.forEach(m => container.appendChild(createMemoryCard(m, true)));

    // Pagination
    const totalPages = Math.ceil(data.total / data.limit);
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (totalPages > 1) {
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        if (i === page) btn.classList.add('active');
        btn.onclick = () => loadMemories(i);
        pg.appendChild(btn);
      }
    }
  } catch(e) {
    container.innerHTML = `<div class="empty"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

// ─── Memory Card ────────────────────────────────
function createMemoryCard(m, showActions = false) {
  const card = document.createElement('div');
  card.className = 'memory-card';
  card.onclick = () => openDetail(m.id || m.id);

  const tier = m.tier || 'warm';
  const tierLabel = {hot:'🔥 HOT', warm:'🌡️ WARM', cold:'❄️ COLD'}[tier] || tier;
  const category = m.category || 'fact';
  const imp = m.importance || 3;
  const decay = m.decay_factor != null ? (m.decay_factor * 100).toFixed(0) + '%' : '100%';

  // For search results, use type-specific fields
  let content = m.content || '';
  let source = m.source || '';
  if (m.type === 'decision') content = `${m.topic}: ${m.decision}`;
  if (m.type === 'message') source = `💬 ${m.session_date || ''}`;

  card.innerHTML = `
    <div class="meta">
      <span class="badge badge-${tier}">${tierLabel}</span>
      <span class="badge badge-importance">⭐${imp}</span>
      <span style="color:var(--text2)">📉 ${decay}</span>
      <span style="color:var(--text2);margin-left:auto">${source}</span>
      <span style="color:var(--text2)">${category}</span>
    </div>
    <div class="content-preview">${escHtml(content)}</div>
  `;
  return card;
}

function renderMemoryCards(container, items) {
  container.innerHTML = '';
  items.forEach(m => container.appendChild(createMemoryCard(m)));
}

// ─── Detail Modal ───────────────────────────────
async function openDetail(id) {
  if (!id) return;
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = '<p style="color:var(--text2)">加载中...</p>';
  overlay.classList.add('show');

  try {
    const m = await api(`/memories/${id}`);
    content.innerHTML = `
      <button class="close-btn" onclick="closeModal()" style="position:static;float:right;background:none;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer">✕</button>
      <h3>${escHtml(m.content?.substring(0, 60) || '记忆详情')}...</h3>
      <div class="field">
        <label>全文</label>
        <textarea id="editContent">${escHtml(m.content || '')}</textarea>
      </div>
      <div class="field" style="display:flex;gap:8px">
        <div style="flex:1">
          <label>分类</label>
          <select id="editCategory">
            <option value="decision" ${m.category==='decision'?'selected':''}>决策</option>
            <option value="preference" ${m.category==='preference'?'selected':''}>偏好</option>
            <option value="constraint" ${m.category==='constraint'?'selected':''}>约束</option>
            <option value="lesson" ${m.category==='lesson'?'selected':''}>教训</option>
            <option value="fact" ${m.category==='fact'?'selected':''}>事实</option>
            <option value="conversation" ${m.category==='conversation'?'selected':''}>对话</option>
          </select>
        </div>
        <div style="flex:1">
          <label>层级</label>
          <select id="editTier">
            <option value="hot" ${m.tier==='hot'?'selected':''}>🔥 Hot</option>
            <option value="warm" ${m.tier==='warm'?'selected':''}>🌡️ Warm</option>
            <option value="cold" ${m.tier==='cold'?'selected':''}>❄️ Cold</option>
          </select>
        </div>
        <div style="flex:1">
          <label>重要性</label>
          <select id="editImportance">
            ${[1,2,3,4,5].map(i => `<option value="${i}" ${m.importance===i?'selected':''}>⭐${i}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>ID: ${id}</label>
        <span style="font-size:0.75rem;color:var(--text2)">来源: ${m.source || '-'} | 创建: ${m.created_at || '-'} | 召回: ${m.recall_count || 0}次 | 衰减: ${((m.decay_factor||1)*100).toFixed(0)}%</span>
      </div>
      <div class="actions">
        <button class="btn-danger" onclick="deleteMemory('${id}')">删除</button>
        <button class="btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn-save" onclick="saveMemory('${id}')">保存</button>
      </div>
    `;
  } catch(e) {
    content.innerHTML = `<p style="color:var(--danger)">错误: ${e.message}</p>`;
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function saveMemory(id) {
  try {
    await api(`/memories/${id}`, {
      method: 'PUT',
      body: JSON.stringify({
        content: document.getElementById('editContent').value,
        category: document.getElementById('editCategory').value,
        tier: document.getElementById('editTier').value,
        importance: parseInt(document.getElementById('editImportance').value),
      })
    });
    closeModal();
    showToast('已保存', 'success');
    loadStats();
    if (document.getElementById('tab-browse').classList.contains('active')) loadMemories(currentPage);
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteMemory(id) {
  if (!confirm('确定删除这条记忆？')) return;
  try {
    await api(`/memories/${id}`, { method: 'DELETE' });
    closeModal();
    showToast('已删除', 'success');
    loadStats();
    if (document.getElementById('tab-browse').classList.contains('active')) loadMemories(currentPage);
  } catch(e) { showToast(e.message, 'error'); }
}

// ─── Graph ──────────────────────────────────────
let graphNetwork = null;
async function loadGraph() {
  try {
    const data = await api('/graph');
    const nodes = (data.nodes || []).map(n => ({
      id: n.id,
      label: (n.label || n.content || '').substring(0, 30),
      title: `<b>${n.category||'?'}</b><br>${(n.content||'').substring(0,200)}`,
      color: {
        background: n.tier==='hot'?'#ff6b6b':n.tier==='cold'?'#6c8ebf':'#ffd93d',
        border: '#1a1a23',
      },
      size: 10 + (n.importance || 3) * 4,
      font: { size: 12, color: '#e4e4f0' },
      borderWidth: 2,
    }));
    const edges = (data.edges || []).map(e => ({
      from: e.source || e.from,
      to: e.target || e.to,
      color: { opacity: Math.min(1, (e.weight || 0.3) * 2) },
      width: Math.max(0.5, (e.weight || 0.3) * 3),
    }));

    const container = document.getElementById('graph-container');
    if (graphNetwork) graphNetwork.destroy();
    graphNetwork = new vis.Network(container, { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) }, {
      physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.005 } },
      interaction: { hover: true, tooltipDelay: 200 },
      nodes: { shape: 'dot' },
    });
    graphNetwork.on('click', function(params) {
      if (params.nodes.length) openDetail(params.nodes[0]);
    });
  } catch(e) {
    document.getElementById('graph-container').innerHTML = `<div class="empty"><div class="icon">⚠️</div>${e.message}</div>`;
  }
}

// ─── Settings ───────────────────────────────────
async function loadConfig() {
  try {
    const cfg = await api('/config');
    document.getElementById('cfgHalfLife').value = cfg.decay_half_life_days || 14;
    document.getElementById('cfgColdThreshold').value = cfg.decay_cold_threshold || 0.1;
    document.getElementById('cfgCleanupThreshold').value = cfg.decay_cleanup_threshold || 0.05;
    document.getElementById('cfgDreamInterval').value = cfg.dream_interval_hours || 6;
  } catch(e) {}
}

async function saveConfig() {
  try {
    await api('/config', {
      method: 'PUT',
      body: JSON.stringify({
        decay_half_life_days: document.getElementById('cfgHalfLife').value,
        decay_cold_threshold: document.getElementById('cfgColdThreshold').value,
        decay_cleanup_threshold: document.getElementById('cfgCleanupThreshold').value,
        dream_interval_hours: document.getElementById('cfgDreamInterval').value,
      })
    });
    showToast('配置已保存', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function exportData() {
  try {
    const res = await api('/export', { raw: true });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `memoria_backup_${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('备份下载中', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function importData() {
  const file = document.getElementById('restoreFile').files[0];
  if (!file) { showToast('请先选择备份文件', 'error'); return; }
  if (!confirm('恢复将覆盖当前数据（会自动备份为 .bak）。确定？')) return;
  try {
    await api('/import', {
      method: 'POST',
      body: file,
      headers: { 'Content-Type': 'application/zip' },
    });
    showToast('恢复成功，刷新页面生效', 'success');
    loadStats();
  } catch(e) { showToast(e.message, 'error'); }
}

async function triggerDream() {
  try {
    const res = await fetch('/dream', { method: 'POST' });
    const data = await res.json();
    showToast('梦境周期完成', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function triggerDecay() {
  try {
    // Use MCP
    const body = { jsonrpc: '2.0', id: 1, method: 'tools/call', params: { name: 'memory_decay', arguments: { action: 'run' } } };
    await fetch('/mcp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    showToast('衰减已完成', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function triggerBridgeSync() {
  try {
    await api('/bridge/sync', { method: 'POST' });
    showToast('桥接同步完成', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

// ─── Toast ──────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─── Helpers ────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Init ───────────────────────────────────────
loadStats();
</script>
</body>
</html>
